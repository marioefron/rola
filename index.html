<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rola</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:#fff;color:#111;
  font-family:'Space Mono',monospace;
  height:100dvh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;touch-action:none;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;flex-direction:column;
  border-bottom:1px solid #e0e0e0;
  flex-shrink:0;background:#fff;
  position:relative;z-index:50;
}
.row{
  display:flex;align-items:center;
  width:100%;padding:7px 8px;gap:5px;
  border-bottom:1px solid #ebebeb;
}
.row:last-child{border-bottom:none;}

.logo{
  font-family:'Space Mono',monospace;font-weight:700;font-size:11px;
  letter-spacing:.08em;text-transform:uppercase;color:#111;flex-shrink:0;
}
.bpm-ctrl{
  display:flex;align-items:center;gap:4px;
  font-size:10px;color:#aaa;flex:1;min-width:0;
}
.bpm-ctrl input[type=range]{
  -webkit-appearance:none;flex:1;min-width:0;max-width:70px;
  height:3px;background:#ddd;border-radius:2px;outline:none;
}
.bpm-ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#111;cursor:pointer;
}
#bpm-v{color:#111;font-weight:700;min-width:22px;font-size:10px;text-align:center;}
.btn.bpm-adj{
  padding:0;width:22px;height:22px;border-radius:50%;
  border:1.5px solid #ccc;color:#666;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;
}

/* Hamburger */
.hamburger{
  width:28px;height:28px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  cursor:pointer;flex-shrink:0;border:none;background:transparent;padding:0;
}
.hamburger span{
  display:block;width:16px;height:1.5px;background:#111;
  transition:all .2s;
}

/* Generic button */
.btn{
  font-family:'Space Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  padding:5px 8px;border-radius:3px;
  border:1.5px solid #ccc;color:#999;
  background:transparent;cursor:pointer;transition:all .12s;flex-shrink:0;
}
.btn:active{transform:scale(.94);}
.btn.play{border-color:#111;color:#111;}
.btn.play.on{background:#111;color:#fff;}
.btn.rst{border-color:#ccc;color:#999;}
.btn.lp.on{border-color:#111;color:#111;}
.btn.lp.off{border-color:#ddd;color:#ccc;}
.btn.edit{border-color:#ccc;color:#888;}
.btn.edit.on{border-color:#111;color:#111;}
.btn.clr-all{border-color:#bbb;color:#888;display:none;}
.btn.clr-all.show{display:block;}

.sep{width:1px;height:16px;background:#e8e8e8;flex-shrink:0;}

/* Sound toggles */
.snd-btn{
  font-family:'Space Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  padding:4px 7px;border-radius:3px;
  border:1.5px solid #ddd;color:#bbb;
  background:transparent;cursor:pointer;transition:all .12s;flex:1;
}
.snd-btn.on{border-color:#111;color:#111;}
.snd-btn.off{border-color:#eee;color:#ccc;text-decoration:line-through;}

/* ── SLIDE-DOWN MENU ── */
#side-menu{
  position:absolute;top:100%;right:0;
  width:260px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-top:none;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  transform:translateY(-8px);
  opacity:0;
  pointer-events:none;
  transition:transform .2s ease, opacity .2s ease;
  z-index:100;
}
#side-menu.open{
  transform:translateY(0);
  opacity:1;
  pointer-events:all;
}
.menu-section{
  padding:12px 16px;
  border-bottom:1px solid #ebebeb;
}
.menu-section:last-child{border-bottom:none;}
.menu-title{
  font-size:8px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:#bbb;margin-bottom:10px;
}
.menu-row{
  display:flex;align-items:center;gap:8px;
}
.metro-lbl{font-size:9px;color:#888;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;}
.metro-val{font-size:12px;font-weight:700;color:#111;min-width:20px;text-align:center;flex-shrink:0;}
.btn.adj{padding:4px 10px;border-color:#ccc;color:#888;}
.btn.msub{padding:5px 12px;border-color:#ddd;color:#bbb;}
.btn.msub.on{border-color:#111;color:#111;}

/* Calibration menu item */
.menu-cal-btn{
  width:100%;
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  padding:9px 12px;border-radius:3px;
  border:1.5px solid #ccc;color:#666;
  background:transparent;cursor:pointer;transition:all .12s;
  text-align:left;
}
.menu-cal-btn:active{transform:scale(.97);}

/* Melodías */
.melody-save-row{
  display:flex;gap:6px;align-items:center;margin-bottom:10px;
}
.melody-name-input{
  font-family:'Space Mono',monospace;font-size:9px;
  flex:1;padding:5px 8px;border:1.5px solid #ddd;
  border-radius:3px;outline:none;color:#111;
  background:#fff;
}
.melody-name-input:focus{border-color:#111;}
.btn.save-mel{padding:5px 10px;border-color:#111;color:#111;}
.melody-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.melody-item{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border:1.5px solid #eee;border-radius:3px;
  background:#fafafa;
}
.melody-item-name{
  flex:1;font-size:9px;font-weight:700;color:#111;
  letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.melody-item-meta{font-size:8px;color:#bbb;flex-shrink:0;}
.btn.load-mel{padding:3px 8px;border-color:#111;color:#111;font-size:8px;}
.btn.del-mel{padding:3px 7px;border-color:#ddd;color:#bbb;font-size:10px;}
.melody-empty{font-size:9px;color:#ccc;letter-spacing:.05em;}

/* Overlay backdrop (cierra el menú al tocar fuera) */
#menu-backdrop{
  display:none;position:fixed;inset:0;z-index:49;
}
#menu-backdrop.open{display:block;}

/* ── TRACK HEADERS ── */
.track-headers{
  display:flex;flex-shrink:0;
  border-bottom:1px solid #e8e8e8;height:56px;background:#fafafa;
}
.th-ruler{width:30px;flex-shrink:0;border-right:1px solid #e8e8e8;}
.th-tracks{display:flex;flex:1;}
.th-track{
  flex:1;display:flex;align-items:center;justify-content:center;
  border-right:1px solid #e8e8e8;
  font-size:13px;font-weight:700;letter-spacing:.05em;color:#bbb;
}
.th-track:last-child{border-right:none;}
.th-snd{cursor:pointer;transition:color .12s,background .12s;gap:5px;flex-direction:row;}
.th-snd.on{background:#888;color:#fff;}
.th-snd.off{background:#fff;color:#ccc;}
.spk-icon{
  width:15px;height:15px;
  fill:none;stroke:currentColor;stroke-width:1.4;
  stroke-linecap:round;stroke-linejoin:round;
  flex-shrink:0;
}
.th-snd.off .spk-wave1,
.th-snd.off .spk-wave2{ display:none; }
.btn.mute-all{
  display:flex;align-items:center;gap:5px;
  border-color:#ccc;color:#999;
}
.btn.mute-all .spk-icon{
  width:12px;height:12px;stroke:currentColor;
}
.btn.mute-all.on .spk-wave1,
.btn.mute-all.on .spk-wave2{ display:block; }
.btn.mute-all.off .spk-wave1,
.btn.mute-all.off .spk-wave2{ display:none; }
.btn.mute-all.off{color:#ccc;border-color:#ddd;}

/* ── ROLL ── */
.roll-wrapper{flex:1;position:relative;overflow:hidden;background:#fff;}
#roll-canvas{position:absolute;top:0;left:0;width:100%;}
#roll-canvas.editing{cursor:crosshair;}

/* Reading line */
.rline{
  position:absolute;left:30px;right:0;height:1.5px;
  background:#111;z-index:10;pointer-events:none;
}
.rline::before{
  content:'';position:absolute;left:-13px;top:-3px;
  width:9px;height:11px;background:#111;
  clip-path:polygon(0 50%,100% 0,100% 100%);
}
.rline-lbl{position:absolute;right:6px;top:-8px;font-size:7px;color:#bbb;letter-spacing:.1em;}

/* Edit hint */
.hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:8px;color:#888;letter-spacing:.06em;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap;z-index:20;
  background:#ffffffee;padding:3px 9px;border-radius:2px;border:1px solid #e0e0e0;
}
.hint.show{opacity:1;}

/* ── INDICATORS ── */
.indicators{
  display:flex;flex-shrink:0;
  border-top:1px solid #e8e8e8;
  height:56px;padding:7px 8px 7px 38px;gap:6px;background:#fafafa;
  transition:background .4s;
}
.ind{
  flex:1;border-radius:2px;border:1.5px solid #111;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#111;
  background:#fff;
  transition:background .04s,border-color .04s,color .04s;
}
.ind.lit{background:#111;border-color:#111;color:#fff;}
/* Calibration states */
.ind.cal-white{background:#fff !important;border-color:#111 !important;color:#fff !important;}
.ind.cal-black{background:#111 !important;border-color:#111 !important;color:#111 !important;}

/* ── CALIBRATION MODAL ── */
#cal-modal{
  display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;
  background:rgba(255,255,255,0.92);
  transition:background .3s;
}
#cal-modal.open{display:flex;}
#cal-modal.cal-transparent{
  background:transparent;
  pointer-events:none;
}
.cal-box{
  background:#fff;border:1.5px solid #111;border-radius:6px;
  padding:28px 24px;width:min(320px,90vw);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.10);
  pointer-events:all;
}
.cal-title{
  font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:#bbb;
}
.cal-msg{
  font-size:12px;font-weight:700;letter-spacing:.04em;
  color:#111;text-align:center;line-height:1.5;
  min-height:36px;
}
/* Tres círculos de cuenta regresiva */
.cal-dots{
  display:flex;gap:14px;
}
.cal-dot{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid #111;background:#fff;
  transition:background .15s;
}
.cal-dot.filled{background:#111;}
/* Banner flotante para fases blanco/negro (sin fondo) */
#cal-phase-banner{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#111;color:#fff;
  font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:10px 20px;border-radius:4px;
  z-index:201;pointer-events:none;
  white-space:nowrap;
}
#cal-phase-banner.open{display:block;}
</style>
</head>
<body>

<div class="topbar">
  <!-- Row 1: logo + bpm + clr-all (edit) + edit btn + hamburger -->
  <div class="row">
    <div class="logo">Rola</div>
    <div class="bpm-ctrl">
      <span>BPM</span>
      <button class="btn bpm-adj" id="bpm-dn">−</button>
      <input type="range" id="bpm-s" min="20" max="160" value="80">
      <button class="btn bpm-adj" id="bpm-up">+</button>
      <span id="bpm-v">80</span>
    </div>
    <button class="btn clr-all" id="btn-clr-all">Limpiar</button>
    <button class="btn edit" id="edit-btn">✏ Editar</button>
    <button class="hamburger" id="hamburger-btn" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
  <!-- Row 2: transport + sound toggles -->
  <div class="row">
    <button class="btn rst" id="b-rst">↺</button>
    <button class="btn play" id="b-play">▶ Play</button>
    <button class="btn lp on" id="b-lp">⟳ Loop</button>
    <button class="btn mute-all on" id="b-mute"><svg class="spk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5h2l3-3v11l-3-3H3z"/><path class="spk-wave1" d="M10 5.5a3 3 0 0 1 0 5"/><path class="spk-wave2" d="M11.5 3.5a5.5 5.5 0 0 1 0 9"/></svg><span>Silenciar</span></button>
  </div>

  <!-- Slide-down menu -->
  <div id="side-menu">
    <!-- Compases -->
    <div class="menu-section">
      <div class="menu-title">Compases</div>
      <div class="menu-row">
        <button class="btn adj" id="bars-dn">−</button>
        <span class="metro-val" id="bars-v">8</span>
        <button class="btn adj" id="bars-up">+</button>
      </div>
    </div>
    <!-- Subdivisión -->
    <div class="menu-section">
      <div class="menu-title">Subdivisión</div>
      <div class="menu-row">
        <button class="btn msub on" id="sub-bin">4</button>
        <button class="btn msub" id="sub-ter">3</button>
      </div>
    </div>
    <!-- Calibración -->
    <div class="menu-section">
      <div class="menu-title">Arduino / LDR</div>
      <button class="menu-cal-btn" onclick="startCalibration()">⊙ Calibrar dispositivo</button>
    </div>
    <!-- Melodías -->
    <div class="menu-section">
      <div class="menu-title">Mis secuencias</div>
      <div class="melody-save-row">
        <input class="melody-name-input" id="mel-name" type="text" placeholder="Nombre de archivo" maxlength="30">
        <button class="btn save-mel" onclick="saveMelody()">Guardar</button>
      </div>
      <div class="melody-list" id="mel-list"></div>
    </div>
  </div>
</div>

<!-- Backdrop -->
<div id="menu-backdrop" onclick="closeMenu()"></div>

<!-- fin banner -->

<!-- Calibration phase banner (shown without overlay during white/black phases) -->
<div id="cal-phase-banner"></div>

<!-- Calibration modal -->
<div id="cal-modal">
  <div class="cal-box">
    <div class="cal-title">Calibrar dispositivo</div>
    <div class="cal-msg" id="cal-msg">Iniciando modo de calibración</div>
    <div class="cal-dots">
      <div class="cal-dot" id="cd0"></div>
      <div class="cal-dot" id="cd1"></div>
      <div class="cal-dot" id="cd2"></div>
    </div>
  </div>
</div>

<div class="track-headers">
  <div class="th-ruler"></div>
  <div class="th-tracks">
    <div class="th-track th-snd on" id="th0" onclick="tglSnd(0)"><svg class="spk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5h2l3-3v11l-3-3H3z"/><path class="spk-wave1" d="M10 5.5a3 3 0 0 1 0 5"/><path class="spk-wave2" d="M11.5 3.5a5.5 5.5 0 0 1 0 9"/></svg>1</div>
    <div class="th-track th-snd on" id="th1" onclick="tglSnd(1)"><svg class="spk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5h2l3-3v11l-3-3H3z"/><path class="spk-wave1" d="M10 5.5a3 3 0 0 1 0 5"/><path class="spk-wave2" d="M11.5 3.5a5.5 5.5 0 0 1 0 9"/></svg>2</div>
    <div class="th-track th-snd on" id="th2" onclick="tglSnd(2)"><svg class="spk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5h2l3-3v11l-3-3H3z"/><path class="spk-wave1" d="M10 5.5a3 3 0 0 1 0 5"/><path class="spk-wave2" d="M11.5 3.5a5.5 5.5 0 0 1 0 9"/></svg>3</div>
    <div class="th-track th-snd on" id="th3" onclick="tglSnd(3)"><svg class="spk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5h2l3-3v11l-3-3H3z"/><path class="spk-wave1" d="M10 5.5a3 3 0 0 1 0 5"/><path class="spk-wave2" d="M11.5 3.5a5.5 5.5 0 0 1 0 9"/></svg>4</div>
  </div>
</div>

<div class="roll-wrapper" id="wrapper">
  <canvas id="roll-canvas"></canvas>
  <div class="rline" id="rline"><span class="rline-lbl">LDR</span></div>
  <div class="hint" id="hint">TAP = agregar · TAP en cuadrado = borrar · DESLIZAR = scroll</div>
</div>

<div class="indicators" id="indicators-row">
  <div class="ind" id="ind0">1</div>
  <div class="ind" id="ind1">2</div>
  <div class="ind" id="ind2">3</div>
  <div class="ind" id="ind3">4</div>
</div>

<!-- fin -->

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const TRACKS=4, RULER=30, SQ=9, HIT=18;

// ── METRO ────────────────────────────────────────────────────────
let BARS=8, BPB=4, SUB=4;
let SNAP=1/SUB, TOTAL=BARS*BPB;

function recomputeMeter(){
  SNAP=1/SUB; TOTAL=BARS*BPB;
  for(let t=0;t<TRACKS;t++) notes[t]=notes[t].filter(b=>b>=0&&b<TOTAL);
  if(playhead>=TOTAL) playhead=0;
  clearTrig();
}

// ── STATE ────────────────────────────────────────────────────────
let bpm=80, playing=false, looping=true, editMode=false;
let playhead=0, lastTs=null, raf=null;
let notes=[[],[],[],[]];
let active=[false,false,false,false];
let sndOn=[true,true,true,true];
let wW=0,wH=0,rY=0,ppb=0,tW=0;
let scrollBeat=0;
let pDown=false,pStartY=0,pMoved=false,pScrollRef=0;
let triggered=[new Set(),new Set(),new Set(),new Set()];

// ── DOM ──────────────────────────────────────────────────────────
const canvas  = document.getElementById('roll-canvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('wrapper');
const rline   = document.getElementById('rline');
const hint    = document.getElementById('hint');
const bPlay   = document.getElementById('b-play');
const bRst    = document.getElementById('b-rst');
const bLp     = document.getElementById('b-lp');
const editBtn = document.getElementById('edit-btn');
const bClrAll = document.getElementById('btn-clr-all');
const bpmS    = document.getElementById('bpm-s');
const bpmV    = document.getElementById('bpm-v');
const inds    = [0,1,2,3].map(i=>document.getElementById('ind'+i));

// ── DEMO ─────────────────────────────────────────────────────────
function loadDemo(){
  notes=[
    [0,1,2,4,5,6,8,8.5,9.5,10,12,14,16,17,18,20,21,24,25,26,28,29,30],
    [1,3,5,7,9,11,13,15,16,18,20,22,24,26,28,30],
    [0,2,4,4.5,6,8,10,12,14,16,17,18,20,22,24,25,26,28,30],
    [0,4,8,10,12,16,18,20,24,26,28,31],
  ];
}
loadDemo();

// ── LAYOUT ───────────────────────────────────────────────────────
function resize(){
  wW=wrapper.clientWidth; wH=wrapper.clientHeight;
  canvas.width=wW; canvas.height=wH;
  tW=(wW-RULER)/TRACKS;
  rY=Math.round(wH*0.22);
  ppb=wH/(BPB*1.4);
  rline.style.top=rY+'px';
  render();
}

// ── RENDER ───────────────────────────────────────────────────────
function beatY(b){
  const ref=editMode?scrollBeat:playhead;
  return rY-(b-ref)*ppb;
}

function render(){
  ctx.clearRect(0,0,wW,wH);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,wW,wH);

  ctx.fillStyle='#fafafa'; ctx.fillRect(0,0,RULER,wH);
  ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.moveTo(RULER,0); ctx.lineTo(RULER,wH); ctx.stroke();

  for(let t=1;t<TRACKS;t++){
    ctx.strokeStyle='#f0f0f0'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(RULER+t*tW,0); ctx.lineTo(RULER+t*tW,wH); ctx.stroke();
  }

  const ref=editMode?scrollBeat:playhead;
  const bTop=ref-(wH-rY)/ppb, bBot=ref+rY/ppb;
  const bS=Math.floor(bTop*SUB)/SUB, bE=Math.ceil(bBot*SUB)/SUB;

  for(let b=bS;b<=bE;b+=SNAP){
    if(b<-SNAP||b>TOTAL+SNAP) continue;
    const y=beatY(b);
    if(y<-2||y>wH+2) continue;
    const isBar =b>=0&&Math.abs(b%BPB)<.001;
    const isBeat=!isBar&&Math.abs(b%1)<.001;
    const isSub =!isBar&&!isBeat;
    if(isSub&&ppb<14) continue;
    ctx.strokeStyle=isBar?'#222222':isBeat?'#666666':'#cccccc';
    ctx.lineWidth=isBar?1.8:.5;
    ctx.beginPath(); ctx.moveTo(RULER,y); ctx.lineTo(wW,y); ctx.stroke();
    if(isBar&&b>=0&&b<=TOTAL){
      const bar=Math.round(b/BPB);
      ctx.fillStyle='#999'; ctx.font='bold 11px Space Mono,monospace';
      ctx.textAlign='center'; ctx.fillText(bar+1,RULER/2,y+4);
    }
  }

  const ey=beatY(TOTAL);
  if(ey>-2&&ey<wH+2){
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(RULER,ey); ctx.lineTo(wW,ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ccc'; ctx.font='7px Space Mono,monospace';
    ctx.textAlign='left'; ctx.fillText('FIN',RULER+3,ey-3);
  }

  if(editMode){
    // Fondo azulado muy tenue sobre las pistas para indicar modo edición
    ctx.fillStyle='rgba(0,0,0,0.03)';
    ctx.fillRect(RULER,0,wW-RULER,wH);
    // Línea guía de inserción más visible
    ctx.strokeStyle='#999'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(RULER,rY); ctx.lineTo(wW,rY); ctx.stroke();
    ctx.setLineDash([]);
  }

  for(let t=0;t<TRACKS;t++){
    const cx=RULER+t*tW+tW/2;
    for(const beat of notes[t]){
      const y=beatY(beat);
      if(y<-SQ-10||y>wH+SQ+10) continue;
      const lit=!editMode&&active[t]&&Math.abs(beat-playhead)<.12;
      ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(RULER+t*tW+4,y); ctx.lineTo(RULER+(t+1)*tW-4,y); ctx.stroke();
      ctx.fillStyle='#111'; ctx.fillRect(cx-SQ,y-SQ,SQ*2,SQ*2);
      if(lit){ ctx.fillStyle='#fff'; ctx.fillRect(cx-3,y-3,6,6); }
    }
  }
}

// ── TRIGGERS ─────────────────────────────────────────────────────
const TWIN=0.08;
function checkTriggers(){
  for(let t=0;t<TRACKS;t++){
    let any=false;
    for(const beat of notes[t]){
      const d=playhead-beat;
      if(d>=0&&d<TWIN){
        any=true;
        const k=beat.toFixed(4);
        if(!triggered[t].has(k)){ triggered[t].add(k); trigSnd(t); }
      }
    }
    if(any!==active[t]){ active[t]=any; inds[t].classList.toggle('lit',any); }
  }
}
function clearTrig(){ triggered=[new Set(),new Set(),new Set(),new Set()]; }

// ── PLAYBACK ─────────────────────────────────────────────────────
function startPlay(){
  playing=true; lastTs=null;
  bPlay.textContent='⏸ Pausa'; bPlay.classList.add('on');
  raf=requestAnimationFrame(loop);
}
function pausePlay(){
  playing=false;
  bPlay.textContent='▶ Play'; bPlay.classList.remove('on');
  cancelAnimationFrame(raf);
  active=[false,false,false,false];
  inds.forEach(i=>i.classList.remove('lit'));
}
function loop(ts){
  if(!playing) return;
  if(lastTs!==null){
    playhead+=(ts-lastTs)/1000*(bpm/60);
    if(playhead>=TOTAL){
      if(looping){ playhead-=TOTAL; clearTrig(); }
      else{ playhead=TOTAL; pausePlay(); render(); return; }
    }
  }
  lastTs=ts; checkTriggers(); render();
  raf=requestAnimationFrame(loop);
}

// ── EDIT POINTER ─────────────────────────────────────────────────
function ptCoords(e){
  const r=canvas.getBoundingClientRect();
  const src=e.changedTouches?e.changedTouches[0]:e;
  const px=src.clientX-r.left, py=src.clientY-r.top;
  const t=Math.floor((px-RULER)/tW);
  const rawBeat=scrollBeat+(rY-py)/ppb;
  const snapped=Math.round(rawBeat*SUB)/SUB;
  return{t:Math.max(0,Math.min(TRACKS-1,t)),beat:snapped,py,valid:px>=RULER};
}
function nearPin(t,beat){
  const tol=HIT/ppb;
  return notes[t].findIndex(b=>Math.abs(b-beat)<=tol);
}
canvas.addEventListener('pointerdown',e=>{
  if(!editMode) return;
  e.preventDefault(); canvas.setPointerCapture(e.pointerId);
  const{py}=ptCoords(e);
  pDown=true; pStartY=py; pMoved=false; pScrollRef=scrollBeat;
});
canvas.addEventListener('pointermove',e=>{
  if(!editMode||!pDown) return;
  e.preventDefault();
  const{py}=ptCoords(e);
  const dy=py-pStartY;
  if(Math.abs(dy)>8){
    pMoved=true;
    scrollBeat=pScrollRef+dy/ppb;
    const minB=-(rY/ppb), maxB=TOTAL+(wH-rY)/ppb;
    scrollBeat=Math.max(minB,Math.min(maxB,scrollBeat));
    render();
  }
});
canvas.addEventListener('pointerup',e=>{
  if(!editMode||!pDown) return;
  e.preventDefault(); pDown=false;
  if(pMoved) return;
  const{t,beat,valid}=ptCoords(e);
  if(!valid||beat<0||beat>TOTAL) return;
  const idx=nearPin(t,beat);
  if(idx>=0) notes[t].splice(idx,1);
  else{
    const s=Math.round(beat*SUB)/SUB;
    if(s>=0&&s<TOTAL){ notes[t].push(s); notes[t].sort((a,b)=>a-b); }
  }
  trigSnd(t); render();
});

// ── CONTROLS ─────────────────────────────────────────────────────
bPlay.addEventListener('click',()=>{ if(playing) pausePlay(); else startPlay(); });
bRst.addEventListener('click',()=>{ pausePlay(); playhead=0; scrollBeat=0; clearTrig(); render(); });
bLp.addEventListener('click',()=>{
  looping=!looping;
  bLp.classList.toggle('on',looping); bLp.classList.toggle('off',!looping);
});
bClrAll.addEventListener('click',()=>{ notes=[[],[],[],[]]; render(); });
editBtn.addEventListener('click',()=>{
  editMode=!editMode;
  editBtn.classList.toggle('on',editMode);
  editBtn.textContent=editMode?'✓ Listo':'✏ Editar';
  canvas.classList.toggle('editing',editMode);
  bClrAll.classList.toggle('show',editMode);
  if(editMode){
    pausePlay();
    scrollBeat=playhead+(rY/ppb); pScrollRef=scrollBeat;
    hint.classList.add('show');
    setTimeout(()=>hint.classList.remove('show'),3500);
  }
  render();
});
const bMute = document.getElementById('b-mute');
bMute.addEventListener('click',()=>{
  const anyOn = sndOn.some(v=>v);
  const newState = !anyOn;
  sndOn = [newState,newState,newState,newState];
  [0,1,2,3].forEach(t=>{
    const b=document.getElementById('th'+t);
    b.classList.toggle('on', newState);
    b.classList.toggle('off', !newState);
  });
  bMute.classList.toggle('on', newState);
  bMute.classList.toggle('off', !newState);
  bMute.querySelector('span').textContent = newState ? 'Silenciar' : 'Activar';
});

bpmS.addEventListener('input',()=>{ bpm=parseInt(bpmS.value); bpmV.textContent=bpm; });

function setBpm(v){
  bpm=Math.max(20,Math.min(160,v));
  bpmS.value=bpm; bpmV.textContent=bpm;
}
document.getElementById('bpm-dn').addEventListener('click',()=>setBpm(bpm-1));
document.getElementById('bpm-up').addEventListener('click',()=>setBpm(bpm+1));
document.getElementById('bars-dn').addEventListener('click',()=>{
  if(BARS<=1) return; BARS--;
  document.getElementById('bars-v').textContent=BARS;
  recomputeMeter(); render();
});
document.getElementById('bars-up').addEventListener('click',()=>{
  if(BARS>=32) return; BARS++;
  document.getElementById('bars-v').textContent=BARS;
  recomputeMeter(); render();
});
document.getElementById('sub-bin').addEventListener('click',()=>{
  BPB=4; SUB=4;
  document.getElementById('sub-bin').classList.add('on');
  document.getElementById('sub-ter').classList.remove('on');
  recomputeMeter(); render();
});
document.getElementById('sub-ter').addEventListener('click',()=>{
  BPB=3; SUB=3;
  document.getElementById('sub-ter').classList.add('on');
  document.getElementById('sub-bin').classList.remove('on');
  recomputeMeter(); render();
});

// ── MELODÍAS ─────────────────────────────────────────────────────
const MEL_KEY = 'rola_melodies';

function getMelodies(){
  try{ return JSON.parse(localStorage.getItem(MEL_KEY)) || []; }
  catch(e){ return []; }
}

function saveMelodies(list){
  localStorage.setItem(MEL_KEY, JSON.stringify(list));
}

function saveMelody(){
  const input = document.getElementById('mel-name');
  const name  = input.value.trim();
  if(!name) { input.focus(); return; }

  const list = getMelodies();
  const now  = new Date();
  const fecha = now.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})
              + ' ' + now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  list.unshift({
    name,
    fecha,
    notes: JSON.parse(JSON.stringify(notes)), // deep copy
    bars: BARS,
    bpb: BPB,
    sub: SUB,
    bpm
  });

  saveMelodies(list);
  input.value = '';
  renderMelodyList();
}

function loadMelody(idx){
  const list = getMelodies();
  const mel  = list[idx];
  if(!mel) return;

  notes  = mel.notes;
  BARS   = mel.bars;
  BPB    = mel.bpb;
  SUB    = mel.sub;
  SNAP   = 1/SUB;
  TOTAL  = BARS*BPB;
  bpm    = mel.bpm;

  // Actualizar UI
  document.getElementById('bars-v').textContent = BARS;
  document.getElementById('bpm-s').value        = bpm;
  document.getElementById('bpm-v').textContent  = bpm;
  document.getElementById('sub-bin').classList.toggle('on', BPB===4);
  document.getElementById('sub-ter').classList.toggle('on', BPB===3);

  clearTrig();
  pausePlay();
  closeMenu();
  render();
}

function deleteMelody(idx){
  const list = getMelodies();
  list.splice(idx, 1);
  saveMelodies(list);
  renderMelodyList();
}

function renderMelodyList(){
  const list = getMelodies();
  const el   = document.getElementById('mel-list');
  if(list.length === 0){
    el.innerHTML = '<span class="melody-empty">Sin secuencias guardadas</span>';
    return;
  }
  el.innerHTML = list.map((m,i) => `
    <div class="melody-item">
      <span class="melody-item-name" title="${m.name}">${m.name}</span>
      <span class="melody-item-meta">${m.fecha}</span>
      <button class="btn load-mel" onclick="loadMelody(${i})">Cargar</button>
      <button class="btn del-mel" onclick="deleteMelody(${i})">✕</button>
    </div>
  `).join('');
}

// ── HAMBURGER MENU ───────────────────────────────────────────────
function toggleMenu(){
  const menu=document.getElementById('side-menu');
  const back=document.getElementById('menu-backdrop');
  const isOpen=menu.classList.contains('open');
  if(isOpen){ closeMenu(); } else {
    menu.classList.add('open');
    back.classList.add('open');
    renderMelodyList();
  }
}
function closeMenu(){
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('menu-backdrop').classList.remove('open');
}

// ── CALIBRATION ──────────────────────────────────────────────────
const calModal       = document.getElementById('cal-modal');
const calMsg         = document.getElementById('cal-msg');
const calDots        = [0,1,2].map(i=>document.getElementById('cd'+i));
const calPhaseBanner = document.getElementById('cal-phase-banner');

function calOpen()        { calModal.classList.add('open'); calModal.classList.remove('cal-transparent'); }
function calClose()       { calModal.classList.remove('open','cal-transparent'); calPhaseBanner.classList.remove('open'); }
function calTransparent() { calModal.classList.add('cal-transparent'); } // quita el fondo durante fases

function calSetMsg(text){ calMsg.textContent = text; }

function calSetDot(idx, filled){
  calDots[idx].classList.toggle('filled', filled);
}

function calSetPhase(text){
  // Ocultar la caja del modal y mostrar solo un banner flotante sin fondo
  calTransparent();
  document.querySelector('.cal-box').style.display = 'none';
  calPhaseBanner.textContent = text;
  calPhaseBanner.classList.add('open');
}

function calSetModalInds(mode){
  inds.forEach(ind=>{
    ind.style.background  = mode==='black' ? '#111' : mode==='white' ? '#fff' : '';
    ind.style.borderColor = mode==='black' ? '#111' : mode==='white' ? '#111' : '';
    ind.style.color       = mode==='black' ? '#111' : mode==='white' ? '#fff'  : '';
  });
}

function playCalBeep(freq=880, dur=0.12, vol=0.4){
  if(!ac) return;
  if(ac.state==='suspended') ac.resume();
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='square';
  o.frequency.value=freq;
  o.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.start(ac.currentTime); o.stop(ac.currentTime+dur);
}

function startCalibration(){
  closeMenu();
  pausePlay();

  // Resetear círculos e indicadores
  calDots.forEach(d=>d.classList.remove('filled'));
  calSetModalInds('normal');
  calSetMsg('Iniciando modo de calibración');
  calOpen();

  setTimeout(()=>{
    // Instrucción al usuario
    calSetMsg('Presionar el botón "Calibrar" al escuchar la señal');

    // Beep 1 + círculo 1
    setTimeout(()=>{
      playCalBeep(130.81, 0.4, 0.8);
      calSetDot(0, true);

      // Beep 2 + círculo 2
      setTimeout(()=>{
        playCalBeep(130.81, 0.4, 0.8);
        calSetDot(1, true);

        // Beep 3 (Sol3) + círculo 3
        setTimeout(()=>{
          playCalBeep(196, 0.55, 1.0);
          calSetDot(2, true);

          // Texto "Presionar botón"
          setTimeout(()=>{
            calSetMsg('Presionar botón');

            // Fase BLANCO
            setTimeout(()=>{
              calSetPhase('Calibrando color blanco');
              calSetModalInds('white');

              // Fase NEGRO
              setTimeout(()=>{
                playCalBeep(130.81, 0.25);
                calSetPhase('Calibrando color negro');
                calSetModalInds('black');

                // Fin
                setTimeout(()=>{
                  playCalBeep(1100, 0.1);
                  setTimeout(()=>playCalBeep(1320, 0.18), 160);
                  // Restaurar caja del modal para mostrar mensaje final
                  document.querySelector('.cal-box').style.display = '';
                  calModal.classList.remove('cal-transparent');
                  calPhaseBanner.classList.remove('open');
                  calSetMsg('Calibración finalizada');
                  calSetModalInds('normal');

                  setTimeout(()=>{ calClose(); }, 2000);

                }, 5000);
              }, 5000);
            }, 1000);
          }, 300);

        }, 1000);
      }, 1000);
    }, 1000);
  }, 2000);
}

// ── AUDIO ────────────────────────────────────────────────────────
let ac   = null;
let bufs = null;

function initAudio(){
  if(ac) return;
  ac   = new (window.AudioContext || window.webkitAudioContext)();
  bufs = buildBuffers(ac);
  // Keepalive: oscilador silencioso para que iOS no suspenda el contexto
  const g=ac.createGain(); g.gain.value=0.001; g.connect(ac.destination);
  const osc=ac.createOscillator(); osc.frequency.value=1; osc.connect(g); osc.start();
  // Remover listeners una vez inicializado
  ['touchstart','mousedown','pointerdown'].forEach(ev=>
    document.removeEventListener(ev, initAudio)
  );
}

// Inicializar en el primer gesto del usuario sobre cualquier elemento
['touchstart','mousedown','pointerdown'].forEach(ev=>
  document.addEventListener(ev, initAudio, {once:false, passive:true, capture:true})
);

function buildBuffers(a){
  function makeKick(){
    const len=Math.ceil(a.sampleRate*0.35), b=a.createBuffer(1,len,a.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++){
      const t=i/a.sampleRate;
      d[i]=Math.sin(2*Math.PI*(150*Math.exp(t*Math.log(38/150)/0.08))*t)*Math.exp(-t*14)
           +(Math.random()*2-1)*Math.exp(-t*80)*0.35;
    }
    return b;
  }
  function makeSnare(){
    const len=Math.ceil(a.sampleRate*0.18), b=a.createBuffer(1,len,a.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++){
      const t=i/a.sampleRate;
      d[i]=Math.sin(2*Math.PI*160*t)*Math.exp(-t*30)*0.5+(Math.random()*2-1)*Math.exp(-t*22)*0.7;
    }
    return b;
  }
  function makeHihat(){
    const len=Math.ceil(a.sampleRate*0.06), b=a.createBuffer(1,len,a.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-(i/a.sampleRate)*60)*0.4;
    return b;
  }
  function makeTom(){
    const len=Math.ceil(a.sampleRate*0.22), b=a.createBuffer(1,len,a.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++){
      const t=i/a.sampleRate;
      d[i]=Math.sin(2*Math.PI*(200*Math.exp(t*Math.log(72/200)/0.14))*t)*Math.exp(-t*18)*0.75;
    }
    return b;
  }
  return [makeKick(), makeSnare(), makeHihat(), makeTom()];
}

function trigSnd(t){
  if(!sndOn[t]) return;
  initAudio();
  if(!bufs) return;
  if(ac.state==='suspended'){ ac.resume(); return; }
  const s=ac.createBufferSource();
  s.buffer=bufs[t];
  s.connect(ac.destination);
  s.start(0);
}

function tglSnd(t){
  sndOn[t]=!sndOn[t];
  const b=document.getElementById('th'+t), on=sndOn[t];
  b.classList.toggle('on',on); b.classList.toggle('off',!on);
}

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('resize',resize);
resize();
</script>
